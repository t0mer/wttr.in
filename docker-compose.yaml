services:
  wttr:
    image: techblog/wttr.in:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config                # config.yaml lives here
      - wttr-data:/app/data                 # GeoLite2-City.mmdb (auto-downloaded on first start)
      - wttr-cache:/var/cache/wttr.in       # weather disk cache
      - wttr-geocache:/app/cache            # IP / location SQLite DBs
      - wttr-logs:/app/log                  # access + error logs
    environment:
      WTTR_MYDIR: /app
    restart: unless-stopped

volumes:
  wttr-data:
  wttr-cache:
  wttr-geocache:
  wttr-logs:
