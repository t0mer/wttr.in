cache:
  # Cache for final rendered responses (HTML, JSON, PNG, text, etc.)
  responses:
    type: lru
    size: 50000          # your previous LRU size
    ttl: 10m             # short TTL for rendered output
    enabled: true

  # Cache for raw weather data from upstream APIs (WWO, etc.)
  weather:
    type: disk
    dir: /var/cache/wttr.in/weather
    ttl: 45m
    max_size_mb: 2048     # 2 GB soft limit
    cleanup_interval: 15m
    enabled: true

ip:
    ipCache: cache/ip2l
    ipCacheDb: /wttr.in/cache/geoip.db
    ipCacheType: db
    geoip2: /app/data/GeoLite2-City.mmdb

geo:
    locationCache: cache/loc
    locationCacheDb: cache/geoloc.db
    locationCacheType: db
    nominatim:
        - name: opencage
          type: opencage
          url: https://api.opencagedata.com/geocode/v1/json
          token: "TOKEN"

weather:
  # provider selects the weather data source.
  # Options: wwo | open_meteo | owm | weatherapi
  # Default (when omitted): uses wwo if a wwo block is present, otherwise open_meteo.
  # provider: open_meteo

  # Open-Meteo — free, no API key required.
  # open_meteo:
  #   baseUrl: https://api.open-meteo.com/v1/forecast  # optional override

  # OpenWeatherMap — free tier available; API key required.
  # owm:
  #   apiKey: "YOUR_OWM_API_KEY"

  # WeatherAPI.com — free tier available; API key required.
  # weatherapi:
  #   apiKey: "YOUR_WEATHERAPI_KEY"

  # WorldWeatherOnline-compatible (original backend, kept for backwards compatibility).
  wwo:
    baseUrl: "http://wttr.in/{lat},{lon}?format=j1&lang={lang}"
    # key: "TOKEN"

logging:
    accessLog: log/access.log
    errorsLog: log/errors.log
    interval: 300

server:
    portHttp: 8080
    portHttps: 8443
    tlsCertFile: /wttr.in/etc/fullchain.pem
    tlsKeyFile: /wttr.in/etc/privkey.pem
